name: Hourly AQHI Sync

on:
  schedule:
    - cron: "0 * * * *"  # 每小时第 0 分钟运行
  workflow_dispatch:      # 允许手动触发

permissions:
  contents: write         # 关键：允许写入仓库文件

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install firebase-admin requests pandas

      - name: Run Sync Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python sync_wan_data.py

      - name: Commit and Push CSV
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add aqhi_history.csv
          git commit -m "Auto-update AQHI history: $(date)" || echo "No changes"
          git push

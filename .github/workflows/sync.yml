name: Hourly AQHI Sync

on:
  schedule:
    - cron: '0 * * * *'     # 每小时整点运行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'     # 建议升级到 3.11 或 3.12

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Sync Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python sync_wan_data.py

      # 如果你以后需要提交 CSV，可以保留下面这部分
      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase || true
          git add GAGNN_Ready_Data_2013_2025.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated AQHI Update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
          fi

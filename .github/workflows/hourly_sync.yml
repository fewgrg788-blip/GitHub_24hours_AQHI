# .github/workflows/hourly_sync.yml
name: ⏱️ BuildTech WAN Hourly Sync & Verify

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_and_predict:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 解決 Node.js 20 棄用警告

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install firebase-admin requests pandas numpy
          echo "✅ Dependencies installed."

      - name: 🔑 Create Firebase Service Account Key
        run: |
          # 從 Secrets 讀取並生成 JSON 檔案
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json
        
      - name: 🔄 Trigger Render Redeploy
        if: success()
        run: |
          echo "正在通知 Render 重新部署以抓取最新數據..."
          curl -X GET "https://api.render.com/deploy/srv-d6tsqu450q8c73fm60gg?key=nN7xBUdAQa0"

      - name: 🚀 Notify Render to Sync
        if: success()
        run: |
          # 1. 提取最新一行數據 (移除 1:，確保包含 Date 欄位)
          LATEST_JSON=$(python -c "import pandas as pd; df=pd.read_csv('aqhi_history_today.csv'); print(df.iloc[-1].to_json())")
          
          echo "📡 發送最新數據至 Render..."
          
          # 2. 將 URL 從 /predict 修正為 /sync，並直接傳送 JSON
          curl -f -X POST "${{ secrets.RENDER_GNN_API }}/sync" \
               -H "Content-Type: application/json" \
               -d "$LATEST_JSON" \
               --connect-timeout 30 \
               --retry 2

      - name: 💾 Commit and Push changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 同時追蹤這兩個檔案
          git add aqhi_history_today.csv aqhi_history_2026.csv
          
          git commit -m "🤖 自動更新數據: $(date) [skip ci]" || echo "無變動"
          git pull --rebase origin main
          git push origin main

name: ⏱️ BuildTech WAN Hourly Sync & Verify

on:
  schedule:
    - cron: "0 * * * *"  # 每小時整點運行
  workflow_dispatch:      # 允許手動點擊運行進行 Debug

permissions:
  contents: write

jobs:
  sync_and_predict:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          pip install firebase-admin requests pandas
          echo "✅ Dependencies installed successfully."

      - name: Run sync script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RENDER_GNN_API: ${{ secrets.RENDER_GNN_API }}  # <--- 確保這行存在
        run: python sync_wan_data.py

      - name: 💾 Commit and Push history CSV
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -f aqhi_history.csv ]; then
            git add aqhi_history.csv
            git commit -m "Auto-update hourly history: $(date)" || echo "No changes to commit"
            git pull --rebase origin main
            git push origin main
            echo "✅ CSV history pushed to GitHub."
          else
            echo "⚠️ CSV file not found, skipping push."
          fi

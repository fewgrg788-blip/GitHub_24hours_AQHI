# .github/workflows/auto_train.yml
name: Auto Retrain GAGNN

on:
  schedule:
    - cron: '0 0 * * 0' # 每週日凌晨執行
  workflow_dispatch:      # 允許你手動按按鈕觸發

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Install AI Libraries
        run: pip install torch dgl pandas numpy scikit-learn # 根據你的 GNN 需求
      - name: Run Training
        run: python train_model.py
      - name: Push New Model
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gagnn_model.pth
          git commit -m "🤖 自動更新訓練模型: $(date)" || echo "無變動"
          git push

# .github/workflows/hourly_sync.yml
name: ⏱️ BuildTech WAN Hourly Sync & Verify

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_and_predict:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 解決 Node.js 20 棄用警告

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install firebase-admin requests pandas numpy
          echo "✅ Dependencies installed."

      - name: 🔑 Create Firebase Service Account Key
        run: |
          # 從 Secrets 讀取並生成 JSON 檔案
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json
        
      - name: 🔄 Run Sync Script
        env:
          # 確保 Python 能讀取到 API 地址
          RENDER_GNN_API: ${{ secrets.RENDER_GNN_API }}
        run: python sync_wan_data.py

      - name: 🚀 Notify Render to Predict
        if: success() # 只有同步成功才執行預測
        run: |
          LATEST_JSON=$(python -c "import pandas as pd; df=pd.read_csv('aqhi_history.csv'); print(df.iloc[-1, 1:].to_json())")
          echo "📡 Sending data to Render..."
          curl -X POST ${{ secrets.RENDER_GNN_API }}/predict \
               -H "Content-Type: application/json" \
               -d "{\"data\": $LATEST_JSON}"

      - name: 💾 Commit and Push changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add aqhi_history.csv
          git commit -m "Auto-update: $(date) [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

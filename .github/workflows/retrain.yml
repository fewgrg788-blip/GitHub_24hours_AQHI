name: GAGNN Auto Retrain

on:
  schedule:
    - cron: '0 0 * * 0' # 每週日凌晨自動訓練
  workflow_dispatch:      # 允許手動觸發

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install torch torch-geometric pandas numpy scikit-learn
          # 注意：GitHub Runner 沒有 GPU，所以會自動安裝 CPU 版 torch
          
      - name: Train Model
        run: python train_model.py
        
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add hk_pro_model_best.pth
          git commit -m "🤖 自動更新模型權重: $(date)" || echo "無變動"
          git push

name: GAGNN Auto Retrain

on:
  schedule:
    - cron: '0 0 * * 0' # 每週日凌晨 08:00 (HKT) 自動訓練
  workflow_dispatch:      # 允許手動觸發測試

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 開啟快取，下次執行會快很多

      - name: 📦 Install ML Dependencies
        run: |
          # 優先安裝 CPU 版 Torch 以節省空間與時間
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric pandas numpy scikit-learn

      - name: 🧠 Train GAGNN Model
        run: |
          echo "🚀 開始每週訓練進化..."
          python train_model.py
          echo "✅ 訓練完成！"

      - name: 💾 Commit and Push Weights
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add hk_pro_model_best.pth scaler_aqhi.pkl scaler_weather.pkl gagnn_prediction_*.csv
          git commit -m "🤖 自動更新模型與預測數據: $(date) [skip ci]" || echo "無變動"
          git pull --rebase origin main
          git push

      - name: 🔔 Trigger Render Deploy
        if: success()
        run: |
          echo "🚀 正在通知 Render 重新部署最新模型..."
          curl -X GET "https://api.render.com/deploy/srv-d6tsqu450q8c73fm60gg?key=nN7xBUdAQa0"

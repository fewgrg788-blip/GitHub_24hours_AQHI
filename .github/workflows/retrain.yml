name: 🧠 GAGNN Auto Retrain

on:
  schedule:
    - cron: '0 0 * * 0' # 每週日凌晨 08:00 (HKT) 執行
  workflow_dispatch:      # 允許手動觸發測試

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 確保獲取完整歷史以進行 rebase

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 🌟 更新 1: 直接使用倉庫內的 requirements.txt，確保與 Render 環境 100% 一致
      - name: 📦 Install ML Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ [Log] ML Dependencies installed from requirements.txt."

      - name: 🔑 Create Firebase Service Account Key
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json
          echo "✅ [Log] Firebase Key file created for training logs."

      # 🌟 更新 2: 使用你指定的測試指令
      - name: 🧠 Train GAGNN Model
        run: |
          echo "🚀 [Log] Starting weekly evolution..."
          # 注意：目前使用的是測試參數 (2 epochs)。若要上線產生真實高精度模型，建議將 --epochs 拉高。
          python train_model.py --csv ./data/ --epochs 2 --batch-size 8
          echo "✅ [Log] Training completed!"

      - name: 💾 Commit and Push Weights
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 只加入真正會產生的 7 個核心檔案
          git add hk_pro_model_best_3h.pth hk_pro_model_best_6h.pth hk_pro_model_best_24h.pth
          git add feat_scaler.pkl aqhi_scaler.pkl
          git add edge_index.pt edge_weight.pt
          
          # 可選：如果未來有產生預測 CSV 也一起加入（不會報錯）
          git add gagnn_prediction_*.csv || true
          
          # 如果沒有任何變更就跳過
          if git diff --staged --quiet; then
            echo "ℹ️ [Log] No model updates detected."
          else
            git commit -m "🤖 [AI Evolution] Auto-updated v2.0 weights & scalars: $(date) [skip ci]"
            # 使用 --autostash 自動處理衝突（最穩健的方式）
            git pull --rebase --autostash origin main
            git push origin main
            echo "✅ [Log] New v2.0 weights successfully pushed to repository."
          fi
      - name: 🔔 Trigger Render Deploy
        if: success()
        run: |
          echo "🚀 [Log] Notifying Render to pull the latest evolved model..."
          curl -X GET "https://api.render.com/deploy/srv-d6tsqu450q8c73fm60gg?key=nN7xBUdAQa0"
